name: suiwave
description: "A free and open source music player."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Audio (ExoPlayer on Android, media_kit on Linux/Windows)
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.0.4
  media_kit_libs_android_audio: ^1.3.2
  audio_service: ^0.18.15

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.2.3

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Network
  dio: ^5.8.0+1

  # Images
  cached_network_image: ^3.4.1

  # Metadata
  audio_metadata_reader: ^1.6.0

  # Theme / color
  palette_generator: ^0.3.3+4
  dynamic_color: ^1.7.0

  # UI
  shimmer: ^3.0.0
  google_fonts: ^8.1.0

  # Storage
  shared_preferences: ^2.3.5

  # Utilities
  collection: ^1.19.1
  ffi: ^2.1.0
  intl: ^0.20.2
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.22.1
  riverpod_generator: ^4.0.4-dev.1

flutter:
  uses-material-design: true
